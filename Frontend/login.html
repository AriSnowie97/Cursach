<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід — Біржа фрілансу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Біржа фрілансу 🚀</h1>
        <nav>
            <ul>
                <li><a href="index.html">Всі замовлення</a></li>
                <li><a href="create-order.html">Створити замовлення</a></li>
                <li><a href="login.html">Вхід / Вихід</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <section class="login-card">
            <h2>Авторизація</h2>
            <form id="loginForm">
                <label for="email">Електронна пошта</label>
                <input type="email" id="email" required placeholder="example@mail.com">

                <label for="password">Пароль</label>
                <input type="password" id="password" required placeholder="••••••••">

                <button type="submit">Увійти</button>
            </form>
        <p style="text-align: center; margin-top: 15px; font-size: 0.9em; color: #666;">
            Немає акаунту? <a href="register.html" style="color: #1a73e8;">Зареєструватися</a>
        </p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
