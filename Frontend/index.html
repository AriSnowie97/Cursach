<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Platform — Курсова</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Біржа фрілансу 🚀</h1>
        </div>
    </header>

    <main class="container">
        
        <section>
            <h2>Створити нове замовлення</h2>
            <form id="orderForm" onsubmit="createOrder(event)">
                <fieldset>
                    <legend>Деталі проєкту</legend>

                    <label for="title">Назва проєкту:</label>
                    <input type="text" id="title" required placeholder="Напр., Створити Telegram-бота Remindly для студентів">

                    <label for="desc">Опис:</label>
                    <textarea id="desc" rows="3" required placeholder="Що саме потрібно зробити?"></textarea>

                    <label for="budget">Бюджет ($):</label>
                    <input type="number" id="budget" required min="1" placeholder="500">

                    <label for="deadline">Дедлайн:</label>
                    <input type="date" id="deadline" required>
                </fieldset>

                <button type="submit">Опублікувати замовлення</button>
            </form>
        </section>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 40px 0;">

    <footer>
        <div class="container" style="text-align: center; margin-top: 40px; color: #777;">
            <p>&copy; 2026 Аріна. Курсовий проєкт.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
