<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Створити замовлення — Біржа</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Біржа фрілансу 🚀</h1>
        <nav>
            <ul>
                <li><a href="index.html">Всі замовлення</a></li>
                <li><a href="create-order.html">Створити замовлення</a></li>
                <li><a href="login.html">Вхід / Вихід</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section>
            <h2>Нове замовлення</h2>
            <form id="orderForm" onsubmit="createOrder(event)">
                <fieldset>
                    <legend>Деталі проєкту</legend>

                    <label for="title">Назва проєкту:</label>
                    <input type="text" id="title" required placeholder="Що потрібно зробити?">

                    <label for="desc">Опис:</label>
                    <textarea id="desc" rows="4" required placeholder="Опишіть деталі завдання..."></textarea>

                    <label for="budget">Бюджет ($):</label>
                    <input type="number" id="budget" required min="1">

                    <label for="deadline">Дедлайн:</label>
                    <input type="date" id="deadline" required>
                </fieldset>

                <button type="submit">Опублікувати замовлення</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
