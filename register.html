<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація — Біржа фрілансу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Біржа фрілансу 🚀</h1>
        <nav>
            <ul>
                <li><a href="index.html">Всі замовлення</a></li>
                <li><a href="create-order.html">Створити замовлення</a></li>
                <li><a href="login.html">Вхід / Вихід</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <section class="login-card">
            <h2>Реєстрація</h2>
            <form id="registerForm">
                <label for="regName">Як вас звати?</label>
                <input type="text" id="regName" required placeholder="Наприклад: Аріна">

                <label for="regEmail">Електронна пошта</label>
                <input type="email" id="regEmail" required placeholder="example@mail.com">

                <label for="regPassword">Пароль</label>
                <input type="password" id="regPassword" required placeholder="••••••••">

                <button type="submit">Створити акаунт</button>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9em; color: #666;">
                Вже є акаунт? <a href="login.html" style="color: #1a73e8;">Увійти</a>
            </p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
